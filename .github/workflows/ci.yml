name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · API + headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import sanity + DB init
        run: |
          python -c "from app.main import app, init_db; init_db(); print('import + schema OK:', app.title)"

      - name: Boot server and exercise the REST API
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          # Wait for liveness.
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/healthz && break
            sleep 0.5
          done

          set -e
          B=http://127.0.0.1:8000

          echo "→ cross-origin isolation headers present"
          curl -sf -D - -o /dev/null $B/ | grep -iq 'cross-origin-opener-policy: same-origin'
          curl -sf -D - -o /dev/null $B/ | grep -iq 'cross-origin-embedder-policy: require-corp'

          echo "→ worker served as JavaScript"
          curl -sf -D - -o /dev/null $B/static/llama_core.js | grep -iq 'content-type: text/javascript'

          echo "→ seeded prompt templates exist"
          test "$(curl -sf $B/api/templates | python -c 'import sys,json; print(len(json.load(sys.stdin)))')" -ge 2

          echo "→ conversation + message CRUD"
          CID=$(curl -sf -X POST $B/api/conversations -H 'Content-Type: application/json' \
                -d '{"title":"ci","model_id":"onnx-community/Llama-3.2-1B-Instruct"}' \
                | python -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -sf -X POST $B/api/conversations/$CID/messages -H 'Content-Type: application/json' \
                -d '{"role":"user","content":"hi","has_image":true,"tokens_per_sec":42.5}' > /dev/null
          test "$(curl -sf $B/api/conversations/$CID | python -c 'import sys,json; print(len(json.load(sys.stdin)["messages"]))')" -eq 1

          echo "→ duplicate template returns 409"
          curl -sf -X POST $B/api/templates -H 'Content-Type: application/json' -d '{"name":"CI Tpl","body":"x"}' > /dev/null
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST $B/api/templates -H 'Content-Type: application/json' -d '{"name":"CI Tpl","body":"y"}')" = "409"

          echo "→ delete returns 204, then 404"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X DELETE $B/api/conversations/$CID)" = "204"
          test "$(curl -s -o /dev/null -w '%{http_code}' $B/api/conversations/$CID)" = "404"

          kill $SERVER_PID
          echo "✓ backend verified"

  frontend:
    name: Frontend · JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax-check the inference worker (ES module)
        run: |
          cp app/static/llama_core.js /tmp/llama_core.mjs
          node --check /tmp/llama_core.mjs
          echo "✓ llama_core.js OK"

      - name: Syntax-check the inline dashboard controller
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('app/templates/index.html','utf8');
            const m = html.match(/<script type=\"module\">([\s\S]*?)<\/script>/g);
            if (!m) { console.error('no module script found'); process.exit(1); }
            const code = m[m.length-1].replace(/^<script[^>]*>/,'').replace(/<\/script>$/,'');
            fs.writeFileSync('/tmp/controller.mjs', code);
          "
          node --check /tmp/controller.mjs
          echo "✓ index.html controller OK"

  docker:
    name: Docker · image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t llama-nexus:ci .
